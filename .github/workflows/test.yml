name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      GOFLAGS: -mod=readonly  # prevents go.sum from being modified during build/test; go mod verify (below) is the checksum-DB gate
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['stable']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - run: go mod verify
      - run: go vet ./...
      - run: go test -race -count=1 -timeout 120s ./...
      - run: go build -o /dev/null .

  gofmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These Go files are not gofmt-clean — run 'gofmt -w' on them:"
            echo "$unformatted"
            exit 1
          fi

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
      - run: cyclonedx-gomod mod -licenses -type library -json -output docgraph.cdx.json .
      - uses: actions/upload-artifact@v7
        with:
          name: docgraph-sbom
          path: docgraph.cdx.json
          if-no-files-found: error
