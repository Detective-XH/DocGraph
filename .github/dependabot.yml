version: 2
updates:

  # Go modules — modernc.org/sqlite isolated in its own group for manual supply chain review
  # (owns ~67% of supply chain); all other deps grouped together
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 6
    groups:
      sqlite-supply-chain:
        patterns: ["modernc.org/sqlite"]
      go-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions — pin by digest is ideal; at minimum keep versions current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 3
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
