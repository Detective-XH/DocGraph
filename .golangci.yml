version: "2"

# Default linters (errcheck, govet, ineffassign, staticcheck, unused) kept.
linters:
  enable:
    - cyclop
  settings:
    cyclop:
      # Per-function complexity backstop, tightened 40 → 20 after the gocyclo
      # campaign drove the whole tree down (handleNode 55, indexStore 44,
      # indexProjectOpts 43, extractHTML 40 — all refactored to ≤14, no longer
      # high-CC). NO //nolint whitelist: the CI job uses --new-from-rev (revgrep),
      # reporting only issues on changed lines, so the sole remaining high-CC
      # function — extractCStyle (36, the by-design-red C-family FSM tokenizer;
      # decisioned LEAVE, not gocyclo-gamed) — is grandfathered untouched and stays
      # VISIBLE on local full runs as a one-item review list. The bar sits just
      # above the GRC soft target (gocyclo ≤13–15) so the two don't double-fire.
      # A PR only trips cyclop by adding a new >20 function or growing one past 20.
      max-complexity: 20
      package-average: 0      # per-function gate only
    errcheck:
      # Conventionally-ignorable cleanup. errcheck matches concrete signatures,
      # so the sql/* cleanup methods are listed explicitly (the io.Closer
      # interface form only matches calls through an io.Closer value).
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*database/sql.Tx).Rollback
        - (*github.com/fsnotify/fsnotify.Watcher).Close
        - (*github.com/Detective-XH/docgraph/internal/store.Store).Close
        - (*github.com/Detective-XH/docgraph/internal/workspace.Workspace).Close
        - (*flag.FlagSet).Parse
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
  exclusions:
    rules:
      # Test setup/teardown: an unchecked error surfaces as a later assertion
      # failure, so errcheck on _test.go is noise rather than signal.
      - path: _test\.go
        linters:
          - errcheck
