version: "2"

# Default linters (errcheck, govet, ineffassign, staticcheck, unused) kept.
linters:
  enable:
    - cyclop
  settings:
    cyclop:
      # Per-function complexity backstop. NO //nolint whitelist: the CI job uses
      # --new-from-rev (revgrep), which reports only issues on changed lines, so
      # the known high-CC baseline (handleNode 55, indexStore 44, indexProjectOpts
      # 43, extractHTML/extractCStyle 40 — all flat-dispatch/inherent, breadth not
      # depth) is grandfathered untouched and stays VISIBLE on local full runs as a
      # periodic-review list. A PR only trips cyclop by adding a new >40 function or
      # by growing an existing one's lines past 40.
      max-complexity: 40
      package-average: 0      # per-function gate only
    errcheck:
      # Conventionally-ignorable cleanup. errcheck matches concrete signatures,
      # so the sql/* cleanup methods are listed explicitly (the io.Closer
      # interface form only matches calls through an io.Closer value).
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*database/sql.Tx).Rollback
        - (*github.com/fsnotify/fsnotify.Watcher).Close
        - (*github.com/Detective-XH/docgraph/internal/store.Store).Close
        - (*github.com/Detective-XH/docgraph/internal/workspace.Workspace).Close
        - (*flag.FlagSet).Parse
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
  exclusions:
    rules:
      # Test setup/teardown: an unchecked error surfaces as a later assertion
      # failure, so errcheck on _test.go is noise rather than signal.
      - path: _test\.go
        linters:
          - errcheck
